<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZenShaders Materials Slider</title>
<style>
  html, body { margin:0; padding:0; }
  .slider { position:relative; width:100%; height:100vh; overflow:hidden; background:#111; }
  .slider img {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:cover; opacity:0; animation: fade 25s infinite;
  }
  .slider img:nth-child(1) { animation-delay: 0s; }
  .slider img:nth-child(2) { animation-delay: 5s; }
  .slider img:nth-child(3) { animation-delay: 10s; }
  .slider img:nth-child(4) { animation-delay: 15s; }
  .slider img:nth-child(5) { animation-delay: 20s; }
  @keyframes fade {
    0%   { opacity: 0; }
    4%   { opacity: 1; }
    20%  { opacity: 1; }
    24%  { opacity: 0; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="slider">
    <img src="Floor_Panorama_01.png" alt="ZenShaders material 1">
    <img src="Floor_Panorama_02.png" alt="ZenShaders material 2">
    <img src="Floor_Panorama_03.png" alt="ZenShaders material 3">
    <img src="Floor_Panorama_04.png" alt="ZenShaders material 4">
    <img src="Floor_Panorama_05.png" alt="ZenShaders material 5">
  </div>
</body>
</html>
